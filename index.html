<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SPI TV - پەخشی پیشەسازی</title>
    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Tahoma', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2f 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        /* Glassmorphism Container */
        .glass-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(15, 25, 45, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FF416C, #FF4B2B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .logo span {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: absolute;
            top: 10px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50px;
            padding: 10px 18px;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            backdrop-filter: blur(5px);
        }

        /* Video Player Section */
        .player-section {
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 35px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        #videoPlayer {
            width: 100%;
            background: #000;
            aspect-ratio: 16/9;
        }

        .current-channel-info {
            padding: 15px 20px;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .channel-title {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-badge {
            background: #e50914;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.95);}
            100% { opacity: 1; transform: scale(1);}
        }

        /* Search Bar */
        .search-bar {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        .search-bar input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: right;
        }

        .search-bar input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* Channels Grid */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 18px;
            max-height: 550px;
            overflow-y: auto;
            padding: 5px;
        }

        .channel-card {
            background: rgba(20, 30, 55, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 15px 10px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .channel-card:hover {
            transform: translateY(-5px);
            background: rgba(40, 55, 90, 0.8);
            border-color: #FF4B2B;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .channel-card.active {
            background: linear-gradient(135deg, #FF416C, #FF4B2B);
            border: none;
        }

        .channel-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .channel-name {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .channel-status {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        /* Light Theme */
        body.light {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            color: #1a1a2e;
        }

        body.light .glass-container {
            background: rgba(255,255,255,0.3);
            border-color: rgba(0,0,0,0.1);
        }

        body.light .channel-card {
            background: rgba(255,255,255,0.7);
            color: #1a1a2e;
        }

        /* Scrollbar */
        .channels-grid::-webkit-scrollbar {
            width: 8px;
        }
        .channels-grid::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .channels-grid::-webkit-scrollbar-thumb {
            background: #FF4B2B;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .glass-container { padding: 15px; }
            .channels-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .channel-name { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="glass-container">
    <div class="header">
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> ڕووناک/تاریک</button>
        <div class="logo">SPI <span>TV</span> 4K</div>
        <div class="subtitle">پەخشی ڕاستەوخۆ بە کوالێتی 4K</div>
    </div>

    <div class="player-section">
        <video id="videoPlayer" controls class="video-js vjs-default-skin"></video>
        <div class="current-channel-info">
            <div class="channel-title">
                <i class="fas fa-tv"></i>
                <span id="currentChannelName">هیچ کەناڵێک هەڵنەبژێراوە</span>
            </div>
            <div class="live-badge"><i class="fas fa-circle"></i> LIVE</div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 گەڕان لە کەناڵەکاندا...">
    </div>

    <div class="channels-grid" id="channelsGrid"></div>
</div>

<script>
    // ==================== کەناڵەکانت ====================
    const channels = [
        { name: "SPI TV 4K", url: "https://live20.bozztv.com/giatv/giatv-spitv4k_kamalblbas/spitv4k_kamalblbas/chunks.m3u8", icon: "fas fa-tv", group: "SPI" },
        { name: "ESRA HD", url: "https://live20.bozztv.com/giatv/giatv-ESRAHD/ESRAHD/chunks.m3u8", icon: "fas fa-film", group: "HD" },
        { name: "Esra 2 HD", url: "https://live20.bozztv.com/giatv/giatv-esra2hd_kamalblbas/esra2hd_kamalblbas/chunks.m3u8", icon: "fas fa-play-circle", group: "HD" },
        { name: "Sharq Quran TV", url: "https://live20.bozztv.com/giatv/giatv-sharqurantv/sharqurantv/chunks.m3u8", icon: "fas fa-quran", group: "دینی" },
        // زیادکردنی کەناڵەکانی ترت (spiquranhd, spikids4k2025, spisportshd, dekanquran)
        { name: "SPI Quran HD", url: "", icon: "fas fa-mosque", group: "دینی" },
        { name: "SPI Kids 4K", url: "", icon: "fas fa-child", group: "مناڵان" },
        { name: "SPI Sports HD", url: "", icon: "fas fa-futbol", group: "وەرزشی" },
        { name: "Dekan Quran", url: "", icon: "fas fa-star-and-crescent", group: "دینی" }
    ];

    // ==================== کۆدی سەرەکی ====================
    let currentPlayer = null;
    let currentChannelIndex = -1;

    // ڕێکخستنی HLS.js
    function initPlayer() {
        const video = document.getElementById('videoPlayer');
        if (Hls.isSupported()) {
            const hls = new Hls({ capLevelToPlayerSize: true });
            hls.attachMedia(video);
            return hls;
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            return null;
        } else {
            alert('براوسەرەکەت پشتیوانی پەخشی زیندوو ناکات');
            return null;
        }
    }

    let hlsPlayer = initPlayer();

    function playChannel(index) {
        if (index < 0 || index >= channels.length) return;
        const channel = channels[index];
        if (!channel.url || channel.url === "") {
            document.getElementById('currentChannelName').innerHTML = `${channel.name} (بەستەر نییە)`;
            return;
        }
        currentChannelIndex = index;
        document.getElementById('currentChannelName').innerHTML = channel.name;
        
        const video = document.getElementById('videoPlayer');
        if (hlsPlayer) {
            hlsPlayer.loadSource(channel.url);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = channel.url;
        }
        video.play().catch(e => console.log("پەخش نەکرا:", e));
        
        // نوێکردنەوەی چالاکی لە کارتەکان
        document.querySelectorAll('.channel-card').forEach((card, i) => {
            if (i === index) card.classList.add('active');
            else card.classList.remove('active');
        });
    }

    function renderChannels(filterText = "") {
        const grid = document.getElementById('channelsGrid');
        grid.innerHTML = "";
        const filtered = channels.filter(ch => ch.name.toLowerCase().includes(filterText.toLowerCase()));
        filtered.forEach((ch, idx) => {
            const originalIndex = channels.findIndex(c => c.name === ch.name && c.url === ch.url);
            const card = document.createElement('div');
            card.className = 'channel-card';
            if (originalIndex === currentChannelIndex) card.classList.add('active');
            card.innerHTML = `
                <div class="channel-icon"><i class="${ch.icon}"></i></div>
                <div class="channel-name">${ch.name}</div>
                <div class="channel-status"><i class="fas fa-wifi"></i> زیندوو</div>
            `;
            card.onclick = () => playChannel(originalIndex);
            grid.appendChild(card);
        });
    }

    // گۆڕینی ڕووناکی/تاریک
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.onclick = () => {
        document.body.classList.toggle('light');
        const icon = themeToggle.querySelector('i');
        if (document.body.classList.contains('light')) {
            icon.classList.remove('fa-moon');
            icon.classList.add('fa-sun');
        } else {
            icon.classList.remove('fa-sun');
            icon.classList.add('fa-moon');
        }
    };

    // گەڕان
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderChannels(e.target.value);
    });

    renderChannels();
</script>
</body>
</html>
