<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>kurdish channels - پەخشی 161 کەناڵ</title>
    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        /* Glassmorphism Container */
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(10, 20, 35, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6A5C, #FF416C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .logo span {
            background: linear-gradient(135deg, #00C9FF, #92FE9D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #aaa;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: absolute;
            left: 20px;
            top: 0;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(5px);
        }

        /* Video Player */
        .player-area {
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 35px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 35px -10px black;
        }
        #videoPlayer {
            width: 100%;
            aspect-ratio: 16/9;
            background: black;
        }
        .player-footer {
            padding: 12px 20px;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .now-playing {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .live-badge {
            background: #e50914;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.96);}
            100% { opacity: 1; transform: scale(1);}
        }

        /* Filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            flex: 2;
            min-width: 200px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .category-filter select {
            padding: 12px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }
        .stats {
            background: rgba(0,0,0,0.4);
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        /* Channels Grid */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
            max-height: 580px;
            overflow-y: auto;
            padding: 5px 5px 15px 5px;
        }
        .channel-card {
            background: rgba(25, 35, 55, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 14px 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .channel-card:hover {
            transform: translateY(-5px);
            background: rgba(45, 60, 90, 0.9);
            border-color: #FF416C;
        }
        .channel-card.active {
            background: linear-gradient(145deg, #FF416C, #FF6A5C);
            border: none;
            box-shadow: 0 8px 20px rgba(255,65,108,0.4);
        }
        .channel-logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .channel-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .channel-logo i {
            font-size: 2.2rem;
            color: #ddd;
        }
        .channel-name {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-group {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* Scrollbar */
        .channels-grid::-webkit-scrollbar {
            width: 6px;
        }
        .channels-grid::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .channels-grid::-webkit-scrollbar-thumb {
            background: #FF416C;
            border-radius: 10px;
        }

        /* Light theme */
        body.light {
            background: radial-gradient(circle at 20% 30%, #e0eafc, #cfdef3);
            color: #111;
        }
        body.light .app-container {
            background: rgba(255,255,255,0.4);
        }
        body.light .channel-card {
            background: rgba(255,255,255,0.7);
            color: #111;
        }
        body.light .search-box input,
        body.light .category-filter select {
            background: rgba(0,0,0,0.1);
            color: #111;
        }

        @media (max-width: 700px) {
            .app-container { padding: 16px; }
            .channels-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .channel-name { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> ڕووناک/تاریک</button>
        <div class="logo">kurdish <span>channels</span></div>
        <div class="sub">١٦١ کەناڵ | پەخشی ڕاستەوخۆ بە 4K</div>
    </div>

    <div class="player-area">
        <video id="videoPlayer" controls playsinline></video>
        <div class="player-footer">
            <div class="now-playing"><i class="fas fa-tower-broadcast"></i> <span id="currentChannelName">هیچ کەناڵێک هەڵنەبژێراوە</span></div>
            <div class="live-badge">LIVE</div>
        </div>
    </div>

    <div class="filters">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 گەڕان بە ناوی کەناڵ...">
        </div>
        <div class="category-filter">
            <select id="categorySelect">
                <option value="ALL">📡 هەموو کەناڵەکان</option>
            </select>
        </div>
        <div class="stats" id="stats">بارکردن...</div>
    </div>

    <div class="channels-grid" id="channelsGrid">
        <div style="text-align:center; padding:40px;">جێ بە سەبرە... کەناڵەکان بار دەکرێن</div>
    </div>
</div>

    ];

    // ==================== کۆدی سەرەکی ====================
    let allChannels = allChannelsData;
    let currentHls = null;
    let activeChannelIndex = -1;
    const video = document.getElementById('videoPlayer');

    function populateCategories() {
        const cats = [...new Set(allChannels.map(ch => ch.group || "گشتی"))];
        const select = document.getElementById('categorySelect');
        select.innerHTML = '<option value="ALL">📡 هەموو کەناڵەکان</option>';
        cats.sort().forEach(cat => {
            select.innerHTML += `<option value="${cat.replace(/"/g, '&quot;')}">📺 ${cat}</option>`;
        });
    }

    function getFilteredChannels() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categorySelect').value;
        return allChannels.filter(ch => {
            const matchSearch = ch.name.toLowerCase().includes(searchTerm);
            const matchCat = category === 'ALL' || ch.group === category;
            return matchSearch && matchCat;
        });
    }

    function renderChannels() {
        const filtered = getFilteredChannels();
        const grid = document.getElementById('channelsGrid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="padding:40px; text-align:center;">هیچ کەناڵێک نەدۆزرایەوە</div>';
            document.getElementById('stats').innerHTML = `📡 0 / ${allChannels.length} کەناڵ`;
            return;
        }
        grid.innerHTML = '';
        filtered.forEach((ch, idx) => {
            const originalIndex = allChannels.findIndex(c => c.name === ch.name && c.url === ch.url);
            const card = document.createElement('div');
            card.className = 'channel-card';
            if (originalIndex === activeChannelIndex) card.classList.add('active');
            const logoHtml = ch.logo && ch.logo.startsWith('http') 
                ? `<img src="${ch.logo}" alt="logo" onerror="this.onerror=null;this.parentElement.innerHTML='<i class=\'fas fa-tv\'></i>';">` 
                : `<i class="fas fa-tv"></i>`;
            card.innerHTML = `
                <div class="channel-logo">${logoHtml}</div>
                <div class="channel-name">${ch.name}</div>
                <div class="channel-group">${ch.group || 'گشتی'}</div>
            `;
            card.onclick = () => playChannelByIndex(originalIndex);
            grid.appendChild(card);
        });
        document.getElementById('stats').innerHTML = `📡 ${filtered.length} / ${allChannels.length} کەناڵ`;
    }

    function playChannelByIndex(index) {
        if (index < 0 || index >= allChannels.length) return;
        const ch = allChannels[index];
        if (!ch.url) return;
        activeChannelIndex = index;
        document.getElementById('currentChannelName').innerHTML = ch.name;
        
        if (currentHls) {
            currentHls.destroy();
            currentHls = null;
        }
        if (Hls.isSupported()) {
            currentHls = new Hls({ capLevelToPlayerSize: true });
            currentHls.attachMedia(video);
            currentHls.loadSource(ch.url);
            currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.log));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = ch.url;
            video.play().catch(e=>console.log);
        } else {
            alert('براوسەرەکەت پشتیوانی پەخشی زیندوو ناکات');
        }
        renderChannels();
    }

    // Event Listeners
    document.getElementById('searchInput').addEventListener('input', () => renderChannels());
    document.getElementById('categorySelect').addEventListener('change', () => renderChannels());
    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('light');
        const icon = document.querySelector('#themeToggle i');
        if (document.body.classList.contains('light')) icon.classList.replace('fa-moon', 'fa-sun');
        else icon.classList.replace('fa-sun', 'fa-moon');
    };

    // Start
    populateCategories();
    renderChannels();
</script>
