        .header h1 i {

            color: #f0b90b;

        /* ==================== ڤیدیۆ پلەیەر ==================== */

        #videoPlayer {

        }
        
        #currentChannel i {
            color: #f0b90b;
        }
        
        .live-badge {
            background: #ef4444;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* ==================== کۆنترۆڵەکان ==================== */
        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 24px;
            align-items: center;
        }
        
        .search-box {
            flex: 2;
            min-width: 250px;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #f0b90b;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .category-box {
            flex: 1;
            min-width: 200px;
        }
        
        .category-box select {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }
        
        .category-box select option {
            background: #1e293b;
            color: white;
        }
        
        .counter {
            padding: 10px 20px;
            background: rgba(240, 185, 11, 0.15);
            border-radius: 50px;
            border: 1px solid rgba(240, 185, 11, 0.3);
            color: #f0b90b;
            font-weight: 500;
            white-space: nowrap;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            max-height: 500px;
            overflow-y: auto;
            padding: 8px 4px;

        .channels-grid::-webkit-scrollbar {
            width: 8px;
        }

            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

            background: #f0b90b;
            border-radius: 10px;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .channel-card:hover {
            transform: translateY(-5px);
            background: rgba(240, 185, 11, 0.15);
            border-color: #f0b90b;
            box-shadow: 0 10px 20px rgba(240, 185, 11, 0.2);
        }
        
        .channel-card.active {
            background: linear-gradient(135deg, #f0b90b, #ff6b6b);
            border: none;
            box-shadow: 0 8px 20px rgba(240, 185, 11, 0.4);
        }
        
        .channel-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .channel-card.active .channel-logo {
            border-color: white;
        }
        
        .channel-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .channel-logo i {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .channel-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .channel-group {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        
        .channel-card.active .channel-name,
        .channel-card.active .channel-group {
            color: white;
        }

        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
        }

            .channel-logo {

            .channel-name {

            }
            
            .controls-bar {

            }

            }

        }

            text-decoration: underline;
        }

        // ==================== گۆڕاوە گشتییەکان ====================
        let currentHls = null;
        let activeChannel = null;
        const video = document.getElementById('videoPlayer');
        const currentChannelSpan = document.querySelector('#currentChannel span');
        const channelsGrid = document.getElementById('channelsGrid');
        const searchInput = document.getElementById('searchInput');
        const categorySelect = document.getElementById('categorySelect');
        const countDisplay = document.getElementById('countDisplay');

        // ==================== پڕکردنەوەی کاتێگۆرییەکان ====================
        function populateCategories() {
            const categories = [...new Set(allChannels.map(ch => ch.group || 'گشتی'))].sort();
            categorySelect.innerHTML = '<option value="ALL">📡 هەموو کەناڵەکان</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = `📺 ${cat}`;
                categorySelect.appendChild(option);
            });
        }

        // ==================== فلتەرکردنی کەناڵەکان ====================
        function getFilteredChannels() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const category = categorySelect.value;
            
            return allChannels.filter(ch => {
                const matchSearch = !searchTerm || ch.name.toLowerCase().includes(searchTerm);
                const matchCategory = category === 'ALL' || ch.group === category;
                return matchSearch && matchCategory;
            });
        }

        // ==================== ڕێندەرکردنی کەناڵەکان ====================
        function renderChannels() {
            const filtered = getFilteredChannels();
            countDisplay.textContent = filtered.length;
            
            if (filtered.length === 0) {
                channelsGrid.innerHTML = '<div class="empty-message"><i class="fas fa-search" style="font-size: 3rem; margin-bottom: 16px; opacity: 0.5;"></i><br>هیچ کەناڵێک نەدۆزرایەوە</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(ch => {
                const isActive = activeChannel && activeChannel.url === ch.url;
                const activeClass = isActive ? 'active' : '';
                
                html += `
                    <div class="channel-card ${activeClass}" onclick="playChannel('${ch.url.replace(/'/g, "\\'")}', '${ch.name.replace(/'/g, "\\'")}')">
                        <div class="channel-logo">
                            ${ch.logo && ch.logo.startsWith('http') 
                                ? `<img src="${ch.logo}" alt="${ch.name}" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-tv\'></i>';">` 
                                : '<i class="fas fa-tv"></i>'}
                        </div>
                        <div class="channel-name">${ch.name}</div>
                        <div class="channel-group">${ch.group || 'گشتی'}</div>
                    </div>
                `;
            });
            
            channelsGrid.innerHTML = html;
        }

        // ==================== پەخشکردنی کەناڵ ====================
        window.playChannel = function(url, name) {
            // دۆزینەوەی کەناڵی چالاک
            activeChannel = allChannels.find(ch => ch.url === url);
            
            // نوێکردنەوەی ناوی کەناڵ
            currentChannelSpan.textContent = name;
            
            // ڕاگرتنی پەخشکردنی پێشوو
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }
            
            // پەخشکردنی کەناڵی نوێ
            if (Hls.isSupported()) {
                currentHls = new Hls({
                    capLevelToPlayerSize: true,
                    maxBufferLength: 30,
                    maxMaxBufferLength: 600
                });
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log('Play error:', e));
                });
                currentHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log('Network error, trying to recover...');
                                currentHls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log('Media error, trying to recover...');
                                currentHls.recoverMediaError();
                                break;
                            default:
                                console.log('Fatal error, cannot recover');
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e => console.log('Play error:', e));
            } else {
                alert('⛔ وێبگەڕەکەت پشتگیری HLS ناکات');
            }
            
            // نوێکردنەوەی ڕێندەر
            renderChannels();
            
            // سکرۆڵ بۆ سەرەوە لە مۆبایل
            if (window.innerWidth <= 768) {
                document.querySelector('.player-wrapper').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // ==================== گوێگرتن لە گۆڕانکارییەکان ====================
        searchInput.addEventListener('input', renderChannels);
        categorySelect.addEventListener('change', renderChannels);

        // ==================== دەستپێکردن ====================
        populateCategories();
        renderChannels();
        
        // پەخشکردنی یەکەم کەناڵ (ئارەزوومەندانە)
        // ئەگەر دەتەوێت یەکەم کەناڵ بە شێوەی خۆکار پەخش بکرێت، ئەم هێڵە لێدەربکە:
        // setTimeout(() => { if (allChannels.length > 0) playChannel(allChannels[0].url, allChannels[0].name); }, 1000);
    </script>
